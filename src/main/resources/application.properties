spring.application.name=library-manager

server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.flywaydb=INFO

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

management.endpoints.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
management.endpoints.web.cors.allowed-methods=GET,OPTIONS
management.endpoints.web.cors.allowed-headers=*
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

tiendanube.client-id=${TIENDA_NUBE_APP_ID}
tiendanube.client-secret=${TIENDA_NUBE_SECRET}
tiendanube.redirect-uri=${TIENDA_NUBE_REDIRECT_URI}
tiendanube.auth-url=https://www.tiendanube.com/apps
tiendanube.token-url=https://www.tiendanube.com/apps/authorize/token
tiendanube.api-url=https://api.tiendanube.com/v1

app.default-bookstore-id=1
app.price-import.progress-update-every-rows=${PROGRESS_UPDATE_ROWS}
app.frontend-url=${FRONTEND_URL}